<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex, nofollow"><title>Patient Record System - Admin</title><style>body{font-family:"Segoe UI",Roboto,Arial,sans-serif;background:#f5f7fa;margin:0;padding:0;color:#333}header{background:#1e40af;color:#fff;padding:20px;text-align:center;font-size:1.5rem;font-weight:700}.container{display:flex;flex-wrap:wrap;gap:30px;padding:30px;max-width:1200px;margin:auto}.card{flex:1;min-width:300px;background:#fff;border-radius:12px;padding:20px;box-shadow:0 4px 12px rgba(0,0,0,.08);transition:transform .2s}.card:hover{transform:translateY(-3px)}h2{color:#1e40af;font-size:1.3rem;margin-bottom:15px}button,input,textarea{width:100%;padding:12px;margin:8px 0;border:1px solid #ccc;border-radius:8px;font-size:1rem}input:focus,textarea:focus{border-color:#1e40af;outline:0;box-shadow:0 0 6px rgba(30,136,229,.3)}button{background:#1e40af;color:#fff;font-weight:700;cursor:pointer;border:none;transition:background .3s}button:hover{background:#1e40af}.spinner{display:none;margin:20px auto;border:5px solid #f3f3f3;border-top:5px solid #1e40af;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite}@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}.summary-card{background:#e3f2fd;border-left:5px solid #1e40af;padding:15px;border-radius:8px;margin-top:20px;margin-bottom:20px}.summary-title{font-weight:700;font-size:1.1rem;margin-bottom:8px}.summary-detail{margin:5px 0}.summary-condition{color:#d32f2f;font-weight:700}.summary-prescription{color:#2e7d32;font-style:italic}.timeline{margin-top:20px;border-left:3px solid #1e40af;padding-left:20px}.timeline-item{position:relative;margin-bottom:20px;padding-left:10px}.timeline-item::before{content:'';position:absolute;left:-28px;top:5px;width:15px;height:15px;border-radius:50%;background:#1e40af;box-shadow:0 0 0 4px #e3f2fd}.timeline-card{background:#fff;border-radius:10px;padding:15px;box-shadow:0 2px 6px rgba(0,0,0,.08)}.timeline-date{font-size:.9rem;color:#666;margin-bottom:5px}.timeline-condition{font-weight:700;color:#d32f2f}.timeline-prescription{margin-top:5px;font-style:italic;color:#2e7d32}footer{background:#1e40af;color:#fff;padding:40px 20px;margin-top:40px}footer .footer-container{max-width:1200px;margin:auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:30px}footer img{max-width:60px;height:auto;margin-right:12px}footer h3,footer h4{font-size:1.1rem;margin-bottom:10px;font-weight:700}footer a,footer p{color:#cbd5e1;font-size:.9rem;line-height:1.5;text-decoration:none}footer a:hover{color:#fff}footer .footer-bottom{border-top:1px solid rgba(255,255,255,.2);margin-top:30px;padding-top:15px;text-align:center;font-size:.85rem;color:#cbd5e1}.footer-contact svg{width:20px;height:20px;fill:#f59e0b;margin-right:8px;flex-shrink:0}.footer-contact a,.footer-contact p{color:#bfdbfe;font-size:.9rem;line-height:1.4}.footer-contact a:hover{color:#fff}</style></head><body><header style="display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:#1e40af;color:#fff"><div style="display:flex;align-items:center"><img src="images/Sri_Chakra_Logo.png" alt="Sri Chakra Logo" style="height:50px;width:auto;object-fit:contain"><div style="margin-left:10px"><h1 style="margin:0;font-size:1.2rem;font-weight:700">Sri Chakra</h1><p style="margin:0;font-size:.9rem;opacity:.9">Eye Clinic</p></div></div><div style="flex-grow:1;text-align:center;font-size:1.8rem;font-weight:600">Sri Chakra Patient Record System</div></header><div class="container"><div class="card"><h2>Add Patient</h2><form id="patientForm"><input id="mobile" placeholder="Mobile Number" required> <input id="name" placeholder="Patient Name" required> <input type="number" id="age" placeholder="Age" required> <textarea id="condition" placeholder="Condition"></textarea> <textarea id="prescription" placeholder="Prescription"></textarea> <button type="submit">Add Patient</button></form></div><div class="card"><h2>Search Patient</h2><input id="searchMobile" placeholder="Enter Mobile Number"> <button onclick="searchPatient()">Search</button><div class="spinner" id="loadingSpinner"></div><div id="summary"></div><div id="addVisitSection" style="display:none;margin-top:20px"><h3 style="color:#1e40af;font-size:1.1rem">➕ Add Visit</h3><textarea id="newCondition" placeholder="New Condition"></textarea> <textarea id="newPrescription" placeholder="New Prescription"></textarea> <button onclick="addVisit()">Add Visit</button></div><div class="timeline" id="timeline"></div></div></div><script>let API_URL="https://script.google.com/macros/s/AKfycbx9uK0WyfEKKPSM3C9giNMqXGjz6uoJz-0w4o06WVu-Nf4dTifdXyu5uFwUSZtbocGu/exec",currentPatient=null;function searchPatient(){var e=document.getElementById("searchMobile").value;document.getElementById("loadingSpinner").style.display="block",fetch(API_URL+"?action=search&mobile="+e).then(e=>e.json()).then(e=>{var t=document.getElementById("summary");let n=document.getElementById("timeline");t.innerHTML="",n.innerHTML="",0===e.length?(t.innerHTML="<p>No patient found.</p>",document.getElementById("addVisitSection").style.display="none"):(currentPatient={mobile:e[0][0],name:e[0][1],age:e[0][2]},t.innerHTML=`\n          <div class="summary-card">\n            <div class="summary-title">${(t=e[e.length-1])[1]} (Age ${t[2]})</div>\n            <div class="summary-detail">Mobile: ${t[0]}</div>\n            <div class="summary-detail">Total Visits: ${e.length}</div>\n            <div class="summary-detail">Latest Visit: ${t[5]}</div>\n            <div class="summary-condition">Condition: ${t[3]}</div>\n            <div class="summary-prescription">Prescription: ${t[4]}</div>\n          </div>\n        `,document.getElementById("addVisitSection").style.display="block",e.forEach(e=>{var t=document.createElement("div");t.className="timeline-item",t.innerHTML=`\n            <div class="timeline-card">\n              <div class="timeline-date">Date: ${e[5]}</div>\n              <div><strong>${e[1]}</strong>, Age ${e[2]} (${e[0]})</div>\n              <div class="timeline-condition">Condition: ${e[3]}</div>\n              <div class="timeline-prescription">Prescription: ${e[4]}</div>\n            </div>\n          `,n.appendChild(t)})),document.getElementById("loadingSpinner").style.display="none"})}function addVisit(){var e,t;return currentPatient?(t=document.getElementById("newCondition").value.trim(),e=document.getElementById("newPrescription").value.trim(),t||e?(t={mobile:currentPatient.mobile,name:currentPatient.name,age:currentPatient.age,condition:t,prescription:e},document.getElementById("loadingSpinner").style.display="block",void fetch(API_URL,{method:"POST",body:JSON.stringify(t)}).then(e=>e.text()).then(()=>{alert("New Visit Added!"),document.getElementById("newCondition").value="",document.getElementById("newPrescription").value="",searchPatient()})):alert("Enter condition or prescription")):alert("Search a patient first")}document.getElementById("patientForm").addEventListener("submit",function(e){e.preventDefault(),e={mobile:document.getElementById("mobile").value,name:document.getElementById("name").value,age:document.getElementById("age").value,condition:document.getElementById("condition").value,prescription:document.getElementById("prescription").value},document.getElementById("loadingSpinner").style.display="block",fetch(API_URL,{method:"POST",body:JSON.stringify(e)}).then(e=>e.text()).then(()=>{alert("Patient Added!"),document.getElementById("patientForm").reset(),document.getElementById("loadingSpinner").style.display="none"})})</script><footer><div class="footer-container"></div></footer><script id="dhws-dataInjector" src="../public/dhws-data-injector.js"></script></body></html>
